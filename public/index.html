<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>初赛考级练习平台</title>
    <link rel="stylesheet" href="/styles.css?v=20260508-manage-filter">
    <script>
      try {
        window.localStorage.removeItem("MathJax-Menu-Settings");
      } catch (error) {}
      window.MathJax = {
        tex: {
          inlineMath: [["$", "$"], ["\\(", "\\)"]],
          displayMath: [["$$", "$$"], ["\\[", "\\]"]]
        },
        options: {
          enableMenu: false,
          enableEnrichment: false,
          enableComplexity: false,
          enableSpeech: false,
          enableBraille: false,
          enableExplorer: false,
          enableExplorerHelp: false,
          menuOptions: {
            settings: {
              enrich: false,
              collapsible: false,
              assistiveMml: false,
              speech: false,
              braille: false,
              help: false,
              inTabOrder: false,
              tabSelects: "none"
            }
          },
          renderActions: {
            assistiveMml: [],
            enrich: [],
            addMenu: [],
            getMenus: [],
            checkLoading: [],
            explorable: []
          }
        },
        a11y: {
          speech: false,
          braille: false,
          explorer: false,
          help: false,
          inTabOrder: false,
          tabSelects: "none",
          voicing: false
        },
        startup: { typeset: false }
      };
    </script>
    <script src="/vendor/mathjax/tex-chtml.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <a class="brand text-brand" href="#/">初赛考级练习平台</a>
        <nav class="nav">
          <a href="#/" data-link="home">试卷</a>
          <a href="#/dashboard" data-link="dashboard">记录</a>
          <a href="#/classes" data-link="classes">班级</a>
          <div class="account-menu">
            <button class="ghost-btn" id="authButton" type="button" aria-haspopup="menu" aria-expanded="false">登录</button>
            <div class="account-dropdown" id="accountMenu" hidden>
              <a href="#/study" id="accountStudyLink">个人学习</a>
              <a href="#/workbench" id="accountWorkbenchLink" data-link="manage" hidden>教师工作台</a>
              <a href="#/manage" id="accountManageLink" data-link="manage" hidden>管理后台</a>
              <button type="button" id="changePasswordButton">修改密码</button>
              <button type="button" id="logoutButton">退出登录</button>
            </div>
          </div>
        </nav>
      </div>
    </header>

    <main class="shell" id="app" aria-live="polite"></main>

    <footer class="footer">
      <div class="shell">初赛考级练习平台 · 支持 GESP 与 CSP-J/S 初赛练习</div>
    </footer>

    <dialog class="auth-dialog" id="authDialog">
      <form class="auth-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2 id="authTitle">登录</h2>
            <p id="authHint">登录后可以保存练习记录、加入班级和提交代码。</p>
          </div>
          <button class="icon-btn" type="button" id="closeAuth" aria-label="关闭">×</button>
        </div>
        <label>
          <span>账号</span>
          <input id="authUsername" autocomplete="username" placeholder="字母开头，4-16 位">
        </label>
        <label>
          <span>密码</span>
          <input id="authPassword" type="password" autocomplete="current-password" placeholder="至少 6 位">
        </label>
        <div class="auth-actions">
          <button class="primary-btn" type="button" id="submitAuth">登录</button>
          <button class="link-btn" type="button" id="toggleAuth">创建账号</button>
        </div>
      </form>
    </dialog>

    <dialog class="auth-dialog" id="passwordDialog">
      <form class="auth-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2>修改密码</h2>
            <p>请输入当前密码，并设置一个新的登录密码。</p>
          </div>
          <button class="icon-btn" type="button" id="closePasswordDialog" aria-label="关闭">×</button>
        </div>
        <label>
          <span>当前密码</span>
          <input id="currentPassword" type="password" autocomplete="current-password">
        </label>
        <label>
          <span>新密码</span>
          <input id="newPassword" type="password" autocomplete="new-password" placeholder="至少 6 位">
        </label>
        <label>
          <span>确认新密码</span>
          <input id="confirmNewPassword" type="password" autocomplete="new-password">
        </label>
        <div class="auth-actions">
          <button class="primary-btn" type="button" id="savePassword">保存密码</button>
          <button class="secondary-btn" type="button" id="cancelPasswordDialog">取消</button>
        </div>
      </form>
    </dialog>

    <dialog class="code-dialog" id="codeInsertDialog">
      <form class="code-insert-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2>插入代码</h2>
            <p>粘贴完整代码，确认预览后插入到当前题目描述。</p>
          </div>
          <button class="icon-btn" type="button" id="closeCodeInsert" aria-label="关闭">×</button>
        </div>
        <label class="code-lang-field">
          <span>语言</span>
          <input id="codeLanguageInput" value="cpp" placeholder="cpp">
        </label>
        <div class="code-insert-grid">
          <textarea id="codeSnippetInput" spellcheck="false" placeholder="在这里粘贴代码"></textarea>
          <div class="code-preview rich-text" id="codeSnippetPreview"></div>
        </div>
        <div class="auth-actions">
          <button class="primary-btn" type="button" id="insertCodeSnippet">插入到题目</button>
          <button class="secondary-btn" type="button" id="cancelCodeInsert">取消</button>
        </div>
      </form>
    </dialog>

    <dialog class="formula-dialog" id="formulaInsertDialog">
      <form class="formula-insert-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2>插入公式</h2>
            <p>输入 LaTeX 公式，确认预览后插入到当前题目描述。</p>
          </div>
          <button class="icon-btn" type="button" id="closeFormulaInsert" aria-label="关闭">×</button>
        </div>
        <div class="formula-insert-grid">
          <textarea id="formulaSnippetInput" spellcheck="false" placeholder="例如：a^2 + b^2 = c^2"></textarea>
          <div class="formula-preview rich-text" id="formulaSnippetPreview"></div>
        </div>
        <div class="auth-actions">
          <label class="inline-check"><input id="formulaDisplayMode" type="checkbox" checked>独立成行</label>
          <button class="primary-btn" type="button" id="insertFormulaSnippet">插入到题目</button>
          <button class="secondary-btn" type="button" id="cancelFormulaInsert">取消</button>
        </div>
      </form>
    </dialog>

    <dialog class="submit-dialog" id="submitConfirmDialog">
      <form class="submit-confirm-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2>确认提交</h2>
            <p>提交后将自动判分并保存到练习记录。</p>
          </div>
          <button class="icon-btn" type="button" id="closeSubmitConfirm" aria-label="关闭">×</button>
        </div>
        <div id="submitStats"></div>
        <div class="auth-actions">
          <button class="primary-btn" type="button" id="confirmSubmit">确认提交</button>
          <button class="secondary-btn" type="button" id="cancelSubmit">返回继续作答</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>
    <script src="/app.js?v=20260508-manage-filter" defer></script>
  </body>
</html>
