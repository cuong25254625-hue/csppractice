<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GESP 练习平台</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <header class="topbar">
      <div class="shell topbar-inner">
        <a class="brand" href="#/">
          <img src="/assets/logo.svg" alt="GESP 练习平台">
          <span>GESP 练习平台</span>
        </a>
        <nav class="nav">
          <a href="#/" data-link="home">试卷</a>
          <a href="#/dashboard" data-link="dashboard">记录</a>
          <a href="#/study" data-link="study">学习</a>
          <a href="#/classes" data-link="classes">班级</a>
          <a href="#/manage" data-link="manage" id="manageLink" hidden>管理</a>
          <button class="ghost-btn" id="authButton" type="button">登录</button>
        </nav>
      </div>
    </header>

    <main class="shell" id="app" aria-live="polite"></main>

    <footer class="footer">
      <div class="shell">本地 GESP 练习平台 · 题库、账号和提交记录保存在当前项目目录</div>
    </footer>

    <dialog class="auth-dialog" id="authDialog">
      <form class="auth-box" method="dialog">
        <div class="dialog-head">
          <div>
            <h2 id="authTitle">登录</h2>
            <p id="authHint">登录后可以保存练习记录和提交代码。</p>
          </div>
          <button class="icon-btn" type="button" id="closeAuth" aria-label="关闭">×</button>
        </div>
        <label>
          <span>账号</span>
          <input id="authUsername" autocomplete="username" placeholder="字母开头，4-16 位">
        </label>
        <label>
          <span>密码</span>
          <input id="authPassword" type="password" autocomplete="current-password" placeholder="至少 6 位">
        </label>
        <div class="auth-actions">
          <button class="primary-btn" type="button" id="submitAuth">登录</button>
          <button class="link-btn" type="button" id="toggleAuth">创建账号</button>
        </div>
      </form>
    </dialog>

    <div class="toast" id="toast" role="status"></div>
    <script src="/app.js" defer></script>
  </body>
</html>
